name: Deploy Backend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. 소스 체크아웃 ────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Java 21 세팅 ─────────────────────────────────────────────────────
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # ── 3. Gradle 캐시 ──────────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # ── 4. 빌드 (테스트 스킵) ────────────────────────────────────────────────
      - name: Build jar
        run: |
          chmod +x gradlew
          ./gradlew bootJar -x test

      # ── 5. EC2 로 jar 전송 ──────────────────────────────────────────────────
      - name: Copy jar to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build/libs/arsoback-0.0.1-SNAPSHOT.jar"
          target: "/opt/koala"
          strip_components: 2

      # ── 6. systemd 재시작 ───────────────────────────────────────────────────
      - name: Restart application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 새 jar 를 koalaback.jar 로 교체
            mv /opt/koala/arsoback-0.0.1-SNAPSHOT.jar /opt/koala/koalaback.jar

            # systemd 서비스 재시작
            sudo systemctl restart koala

            # 기동 확인 (최대 120초 대기)
            for i in $(seq 1 24); do
              sleep 5
              if curl -sf http://localhost:8080/actuator/health > /dev/null; then
                echo "Health check passed"
                exit 0
              fi
              echo "Waiting... ($i/24)"
            done

            echo "Health check failed — 최근 로그:"
            sudo journalctl -u koala -n 50 --no-pager
            exit 1
