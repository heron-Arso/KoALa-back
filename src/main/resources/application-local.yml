spring:
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            authorization-grant-type: authorization_code
            scope:
              - profile_nickname
              - account_email
          naver:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/naver"
            authorization-grant-type: authorization_code
            scope:
              - name
              - email
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

oauth2:
  redirect-uri: http://localhost:3000/oauth2/callback

  datasource:
    url: jdbc:mysql://localhost:3306/koala?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        show_sql: true

  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: local-dev-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
  access-token-expiry-ms: 1800000
  refresh-token-expiry-ms: 604800000

cloud:
  aws:
    s3:
      bucket: koala-dev
    region:
      static: ap-northeast-2
    credentials:
      access-key: test
      secret-key: test

koala:
  cdn-base-url: https://dev-cdn.koala.com

toss:
  secret-key: test_sk_placeholder

logging:
  level:
    com.koala.koalaback: DEBUG
    org.hibernate.SQL: DEBUG